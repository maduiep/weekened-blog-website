<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Public+Sans:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#3e484c",
                        "tertiary-fixed": "#ffdcc1",
                        "secondary-fixed": "#ffe08f",
                        "on-secondary-fixed-variant": "#584400",
                        "on-primary-fixed-variant": "#004e5e",
                        "background": "#101416",
                        "on-secondary": "#3d2e00",
                        "outline": "#889297",
                        "on-background": "#dfe3e5",
                        "tertiary": "#ffb778",
                        "primary-container": "#007e97",
                        "surface-container": "#1c2022",
                        "surface-dim": "#101416",
                        "surface-container-lowest": "#0a0f10",
                        "error-container": "#93000a",
                        "on-error": "#690005",
                        "surface-container-highest": "#313537",
                        "surface": "#101416",
                        "on-secondary-fixed": "#241a00",
                        "on-surface-variant": "#bec8cd",
                        "tertiary-container": "#a46423",
                        "surface-bright": "#353a3c",
                        "surface-container-high": "#262b2c",
                        "on-primary": "#003642",
                        "primary-fixed-dim": "#78d3ee",
                        "primary-fixed": "#b1ebff",
                        "on-tertiary-container": "#fff9f6",
                        "surface-container-low": "#181c1e",
                        "on-tertiary": "#4c2700",
                        "on-secondary-container": "#fdd977",
                        "primary": "#78d3ee",
                        "inverse-surface": "#dfe3e5",
                        "surface-variant": "#313537",
                        "secondary-fixed-dim": "#e6c364",
                        "inverse-on-surface": "#2d3133",
                        "secondary": "#e6c364",
                        "error": "#ffb4ab",
                        "secondary-container": "#785d00",
                        "on-tertiary-fixed": "#2e1500",
                        "tertiary-fixed-dim": "#ffb778",
                        "on-error-container": "#ffdad6",
                        "surface-tint": "#78d3ee",
                        "on-primary-fixed": "#001f27",
                        "inverse-primary": "#00677c",
                        "on-tertiary-fixed-variant": "#6c3a00",
                        "on-primary-container": "#f4fbff",
                        "on-surface": "#dfe3e5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Newsreader"],
                        "display": ["Newsreader"],
                        "body": ["Public Sans"],
                        "label": ["Public Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(49, 53, 55, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Blurred Content Background Mockup -->
<div class="fixed inset-0 z-0 flex flex-col opacity-20 pointer-events-none scale-105">
<header class="flex justify-between items-center w-full px-6 py-4 border-b border-outline-variant/20">
<div class="text-2xl font-display italic font-bold tracking-tighter">WEEKEND POST</div>
<div class="flex gap-4">
<span class="material-symbols-outlined">menu</span>
</div>
</header>
<main class="p-8 grid grid-cols-12 gap-8">
<div class="col-span-8">
<div class="h-8 w-24 bg-secondary/20 mb-4"></div>
<div class="h-16 w-3/4 bg-on-surface/10 mb-6"></div>
<div class="h-96 w-full bg-surface-container-high"></div>
</div>
<div class="col-span-4 space-y-4">
<div class="h-48 w-full bg-surface-container-low"></div>
<div class="h-48 w-full bg-surface-container-low"></div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-surface-container-lowest/80 backdrop-blur-sm">
<!-- Transactional Component: Payment Modal -->
<div class="relative w-full max-w-lg overflow-hidden rounded-xl shadow-[0_40px_100px_rgb(0,0,0,0.8)] bg-surface border border-outline-variant/10">
<!-- Modal Header -->
<div class="p-8 pb-0 flex flex-col items-center text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-surface-container-high mb-6">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<p class="font-label text-[10px] font-bold uppercase tracking-[0.2em] text-tertiary mb-2">Checkout Securely</p>
<h2 class="font-display text-4xl italic text-on-surface tracking-tight mb-2">Subscription Payment</h2>
<p class="font-body text-sm text-on-surface-variant max-w-xs leading-relaxed">Complete your transaction for Weekend Post Premium via DPO Pay.</p>
</div>
<!-- Modal Body: Form -->
<div class="p-8 pt-10">
<form class="space-y-8">
<!-- Card Number Field -->
<div class="relative group">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-outline mb-1 group-focus-within:text-primary transition-colors" for="card-number">Card Number</label>
<div class="flex items-center border-b border-outline-variant group-focus-within:border-primary transition-all pb-1">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-body text-lg tracking-widest placeholder:text-surface-container-highest" id="card-number" name="card-number" placeholder="0000 0000 0000 0000" type="text"/>
<div class="flex gap-2">
<span class="material-symbols-outlined text-outline-variant text-xl">credit_card</span>
</div>
</div>
</div>
<!-- Expiry and CVC Row -->
<div class="grid grid-cols-2 gap-12">
<div class="relative group">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-outline mb-1 group-focus-within:text-primary transition-colors" for="expiry">Expiry Date</label>
<div class="border-b border-outline-variant group-focus-within:border-primary transition-all pb-1">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-body text-lg tracking-widest placeholder:text-surface-container-highest" id="expiry" name="expiry" placeholder="MM/YY" type="text"/>
</div>
</div>
<div class="relative group">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-outline mb-1 group-focus-within:text-primary transition-colors" for="cvc">CVC</label>
<div class="flex items-center border-b border-outline-variant group-focus-within:border-primary transition-all pb-1">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-body text-lg tracking-widest placeholder:text-surface-container-highest" id="cvc" name="cvc" placeholder="•••" type="password"/>
<span class="material-symbols-outlined text-outline-variant text-xl">help_outline</span>
</div>
</div>
</div>
<!-- Secure Checkout Button -->
<div class="pt-4 flex flex-col items-center gap-6">
<button class="w-full py-4 bg-gradient-to-br from-primary-container to-primary text-on-primary font-label text-xs font-bold uppercase tracking-[0.2em] rounded-lg shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Secure Checkout</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<button class="text-on-surface-variant hover:text-on-surface font-label text-[10px] font-bold uppercase tracking-widest transition-colors decoration-tertiary underline-offset-4 hover:underline" type="button">
                            Cancel
                        </button>
</div>
</form>
</div>
<!-- Modal Footer: Trust Indicators -->
<div class="bg-surface-container-low px-8 py-4 flex justify-between items-center border-t border-outline-variant/10">
<div class="flex items-center gap-2 grayscale opacity-40">
<div class="w-8 h-5 bg-on-surface-variant rounded-sm flex items-center justify-center text-[6px] font-black italic">VISA</div>
<div class="w-8 h-5 bg-on-surface-variant rounded-sm flex items-center justify-center text-[6px] font-black italic">MC</div>
</div>
<div class="flex items-center gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-secondary"></div>
<span class="font-label text-[9px] font-bold uppercase tracking-tighter text-outline">Encrypted by DPO Pay</span>
</div>
</div>
<!-- Signature Editorial Element: The Golden Thread -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-12 h-1 bg-secondary"></div>
</div>
</div>
<!-- Background texture and depth -->
<div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
<div class="absolute -top-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-primary-container/5 blur-[120px]"></div>
<div class="absolute -bottom-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-secondary-container/5 blur-[120px]"></div>
</div>
</body></html>
