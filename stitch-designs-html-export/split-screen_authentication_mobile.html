<div class="w-full max-w-md space-y-8">
<div class="text-center space-y-2">

<h2 class="text-4xl font-display font-bold text-on-surface tracking-tight -mt-1">Sign In</h2>
<p class="text-sm font-body text-on-surface-variant max-w-[280px] mx-auto">Access the full archive of Weekend Post's investigative insights.</p>
</div>
<form class="space-y-6">
<div class="space-y-4">
<div class="relative">
<label class="inter-label text-[10px] font-bold text-on-surface-variant absolute -top-2 left-0" for="email_signin">Email Address</label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline py-3 px-0 focus:ring-0 focus:border-primary focus:border-b-2 transition-all placeholder:text-outline-variant/50 font-body text-on-surface" id="email_signin" placeholder="name@ledger.bw" type="email"/>
</div>
<div class="relative">
<label class="inter-label text-[10px] font-bold text-on-surface-variant absolute -top-2 left-0" for="password_signin">Password</label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline py-3 px-0 focus:ring-0 focus:border-primary focus:border-b-2 transition-all placeholder:text-outline-variant/50 font-body text-on-surface" id="password_signin" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex justify-end">
<a class="text-sm font-body text-on-surface-variant hover:text-primary transition-colors border-b border-transparent hover:border-primary pb-0.5" href="#">Forgot Password?</a>
</div>
<button class="w-full bg-primary py-4 text-white font-medium rounded-lg hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="inter-label text-sm">Sign In</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>

</div>
</div>

</div>
<form class="space-y-6">
<div class="grid grid-cols-1 gap-6">
<div class="relative">
<label class="inter-label text-[10px] font-bold text-on-surface-variant absolute -top-2 left-0" for="full_name">Full Name</label>
<input class="w-full bg-transparent border-0 border-b border-outline py-3 px-0 focus:ring-0 focus:border-primary focus:border-b-2 transition-all font-body text-on-surface" id="full_name" placeholder="Khumo Mokgweetsi" type="text"/>
</div>
<div class="relative">
<label class="inter-label text-[10px] font-bold text-on-surface-variant absolute -top-2 left-0" for="email_signup">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline py-3 px-0 focus:ring-0 focus:border-primary focus:border-b-2 transition-all font-body text-on-surface" id="email_signup" placeholder="khumo@example.com" type="email"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="relative">
<label class="inter-label text-[10px] font-bold text-on-surface-variant absolute -top-2 left-0" for="password_signup">Password</label>
<input class="w-full bg-transparent border-0 border-b border-outline py-3 px-0 focus:ring-0 focus:border-primary focus:border-b-2 transition-all font-body text-on-surface" id="password_signup" placeholder="••••••••" type="password"/>
</div>
<div class="relative">
<label class="inter-label text-[10px] font-bold text-on-surface-variant absolute -top-2 left-0" for="confirm_password">Confirm</label>
<input class="w-full bg-transparent border-0 border-b border-outline py-3 px-0 focus:ring-0 focus:border-primary focus:border-b-2 transition-all font-body text-on-surface" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<div class="bg-surface-container-low p-4 rounded-lg flex items-start gap-3">
<input class="mt-1 rounded border-outline-variant text-primary focus:ring-primary" id="terms" type="checkbox"/>
<label class="text-[11px] leading-relaxed text-on-surface-variant font-body" for="terms">
                            I agree to the <a class="text-primary underline" href="#">Terms of Service</a> and <a class="text-primary underline" href="#">Privacy Policy</a>. I understand my data remains secure.
                        </label>

<button class="w-full bg-primary-container text-on-primary-container py-4 font-medium rounded-lg hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
